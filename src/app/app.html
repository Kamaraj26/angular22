<app-header></app-header>
<main style="display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0;">
  <div>
    <h1>Welcome Zomota TCET</h1>

    <div style="margin-top:1rem;">
      <label style="display:block; margin-bottom:.5rem;">
        Name:
        <input type="text" [value]="zomota().name" (blur)="updateField('name', $any($event.target).value)" />
      </label>

      <label style="display:block; margin-bottom:.5rem;">
        Age:
        <input type="number" [value]="zomota().age" (blur)="updateField('age', $any($event.target).value)" />
      </label>

      <label style="display:block; margin-bottom:.5rem;">
        DOB:
        <input type="date" [value]="zomota().dob" (blur)="updateField('dob', $any($event.target).value)" />
      </label>

      <div style="margin-top:1rem;">
        <strong>Preview:</strong>
        <div>Name: {{ zomota().name }}</div>
        <div>Age: {{ zomota().age }}</div>
        <div>DOB: {{ zomota().dob }}</div>
      </div>
    </div>
  </div>
</main>
